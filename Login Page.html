<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#2874f0,#6dd5fa);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.login-container h2{
    text-align:center;
    color:#2874f0;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

.input-group input:focus{
    border-color:#2874f0;
    outline:none;
}

.options{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
    font-size:14px;
}

.options a{
    text-decoration:none;
    color:#2874f0;
}

.login-btn{
    width:100%;
    padding:12px;
    background:#2874f0;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

.login-btn:hover{
    background:#0d5bd7;
}

.signup{
    text-align:center;
    margin-top:20px;
}

.signup a{
    color:#2874f0;
    text-decoration:none;
    font-weight:bold;
}

#message{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
    font-size:16px;
}
</style>

</head>
<body>

<div class="login-container">

<h2>User Login</h2>

<form onsubmit="return loginUser();">

<div class="input-group">
<label>Email Address</label>
<input type="email" id="email" placeholder="Enter your email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" placeholder="Enter your password" required>
</div>

<div class="options">
<label>
<input type="checkbox"> Remember Me
</label>

<a href="#">Forgot Password?</a>
</div>

<button type="submit" class="login-btn">
Login
</button>

<p id="message"></p>

<div class="signup">
<p>Don't have an account?
<a href="#">Register</a>
</p>
</div>

</form>

</div>

<script>
function loginUser(){

    // Default Login Credentials
    var validEmail = "admin@gmail.com";
    var validPassword = "123456";

    // User Input
    var email = document.getElementById("email").value;
    var password = document.getElementById("password").value;
    var message = document.getElementById("message");

    // Validation
    if(email === validEmail && password === validPassword){

        message.style.color = "green";
        message.innerHTML = "✅ Login Successful!";

        // Redirect after 2 seconds (Optional)
        setTimeout(function(){
            window.location.href = "index.html";
        },2000);

    }else{

        message.style.color = "red";
        message.innerHTML = "❌ Invalid Email or Password";

    }

    return false; // Prevent form submission
}
</script>

</body>
</html>
