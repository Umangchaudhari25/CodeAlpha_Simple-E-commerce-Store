<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#2874f0;
    color:white;
    text-align:center;
    padding:18px;
}

.container{
    width:85%;
    margin:30px auto;
}

.cart{
    background:white;
    border-radius:10px;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

.cart-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid #ddd;
    padding:20px 0;
}

.cart-item img{
    width:120px;
    height:120px;
    border-radius:10px;
}

.details{
    flex:1;
    margin-left:20px;
}

.details h2{
    margin-bottom:10px;
}

.price{
    color:green;
    font-size:22px;
    font-weight:bold;
}

.quantity input{
    width:60px;
    padding:8px;
    text-align:center;
    font-size:16px;
}

.remove{
    background:red;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.summary{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

.summary h2{
    margin-bottom:20px;
}

.summary p{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
    font-size:18px;
}

.checkout{
    width:100%;
    padding:15px;
    background:#28a745;
    color:white;
    font-size:18px;
    border:none;
    border-radius:5px;
    margin-top:20px;
    cursor:pointer;
}

.checkout:hover{
    background:#218838;
}

@media(max-width:768px){

.cart-item{
    flex-direction:column;
    text-align:center;
}

.details{
    margin:15px 0;
}

}
</style>

</head>
<body>

<header>
<h1>🛒 Shopping Cart</h1>
</header>

<div class="container">

<div class="cart">

<div class="cart-item">

<img src="c:\Users\umang\OneDrive\문서\GitHub\desktop-tutorial\project\tshirts.avif">

<div class="details">
<h2>Men's Cotton T-Shirt</h2>
<p class="price">₹499</p>
<p>Color : Black</p>
<p>Size : M</p>
</div>

<div class="quantity">
<label>Qty</label><br><br>
<input type="number" value="1 to 3" min="1">
</div>

<button class="remove">Remove</button>

</div>

</div>

<div class="summary">

<h2>Order Summary</h2>

<p>
<span>Subtotal</span>
<span>₹499</span>
</p>

<p>
<span>Delivery</span>
<span>₹50</span>
</p>

<hr><br>

<p style="font-size:22px;font-weight:bold;">
<span>Total</span>
<span>₹549</span>
</p>

<button class="checkout">
Proceed to Checkout
</button>

</div>

</div>
<script>

const price = 499;
const delivery = 50;

function updateCart(){

    let qty = document.getElementById("qty").value;

    if(qty < 1){
        qty = 1;
        document.getElementById("qty").value = 1;
    }

    if(qty > 3){
        qty = 3;
        document.getElementById("qty").value = 3;
    }

    let subtotal = price * qty;
    let total = subtotal + delivery;

    document.getElementById("subtotal").innerHTML = "₹" + subtotal;
    document.getElementById("total").innerHTML = "₹" + total;
}

function removeItem(){

    document.querySelector(".cart").innerHTML =
    "<h2 style='text-align:center;color:red;'>🛒 Cart is Empty</h2>";

    document.querySelector(".summary").style.display="none";
}

function checkout(){

    let qty = document.getElementById("qty").value;

    alert("Order Placed Successfully!\n\nQuantity : " + qty +
          "\nTotal Amount : " + document.getElementById("total").innerHTML);
}

</script>
</body>
</html>
